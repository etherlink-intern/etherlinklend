name: Slither
on: [push, pull_request]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  slither:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { submodules: recursive }
      - uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
      - uses: crytic/slither-action@b52cc1cbfee9ca3e8722dd5224299d16c9a6b80f # v0.4.2
        id: slither
        continue-on-error: true
        with:
          target: .
          slither-config: .slither.json
          sarif: slither-report.sarif
      # Always keep the report as a downloadable artifact (works on any repo).
      - uses: actions/upload-artifact@v7
        if: always() && hashFiles('slither-report.sarif') != ''
        with:
          name: slither-sarif
          path: slither-report.sarif
      # Code scanning upload needs GitHub Advanced Security on PRIVATE repos.
      # Keep it non-fatal so the job stays green when GHAS is unavailable.
      - uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('slither-report.sarif') != ''
        continue-on-error: true
        with: { sarif_file: slither-report.sarif }
